customHeaders:
  - pattern: "/"
    headers:
      - key: "Link"
        value: '</index.md>; rel="alternate"; type="text/markdown"'
  - pattern: "/index.html"
    headers:
      - key: "Link"
        value: '</index.md>; rel="alternate"; type="text/markdown"'
  - pattern: "/index.md"
    headers:
      - key: "Content-Type"
        value: "text/markdown; charset=utf-8"
